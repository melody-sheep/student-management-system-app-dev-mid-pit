<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 1. Navigation Bar -->
    <nav>
        <h1>Student Management System</h1>
    </nav>

    <!-- 2. Main Container -->
    <main>
        <!-- 3. Student Form Section -->
        <section class="form-section">
            <h2>Add New Student</h2>
            <form id="studentForm">
                <input type="text" id="student_number" placeholder="Student Number" required>
                <input type="text" id="first_name" placeholder="First Name" required>
                <input type="text" id="last_name" placeholder="Last Name" required>
                <select id="course" required>
                    <option value="">Select Course</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Data Science">Data Science</option>
                </select>
                <input type="number" id="year_level" placeholder="Year Level" min="1" max="4" required>
                <button type="submit">Add Student</button>
            </form>
        </section>

        <!-- 4. Search and Filter Section -->
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name...">
            <button id="searchBtn">Search</button>
            <select id="filterCourse">
                <option value="">All Courses</option>
                <!-- Will be populated by JS -->
            </select>
        </section>

        <!-- 5. Students Table Section -->
        <section class="table-section">
            <h2>Student Records</h2>
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student #</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Course</th>
                        <th>Year</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Dynamic content will load here -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- 6. Footer -->
    <footer>
        <p>&copy; 2024 Student Management System</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
